<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSight x LAISA | AI Email Triage</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C9A84C;
            --bg: #0A0A0A;
            --surface: #111111;
            --card: #1A1A1A;
            --text: #F5F0E8;
            --muted: #8A8578;
            --success: #4CAF50;
            --warning: #FFA726;
            --error: #EF5350;
            --border: #2A2A2A;
        }

        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* === DEMO BANNER === */
        .demo-banner {
            background: linear-gradient(90deg, var(--gold), #D4B65C, var(--gold));
            color: #0A0A0A;
            text-align: center;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.5s 0.2s forwards;
        }

        /* === TOP BAR === */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: fadeIn 0.5s 0.4s forwards;
        }

        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .top-bar-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--gold), #D4B65C);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 700;
            font-size: 18px;
            color: #0A0A0A;
        }

        .top-bar-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .top-bar-title span {
            color: var(--gold);
        }

        .top-bar-subtitle {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-top: 1px;
        }

        .top-bar-stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .stat-value.gold { color: var(--gold); }
        .stat-value.green { color: var(--success); }
        .stat-value.amber { color: var(--warning); }
        .stat-value.red { color: var(--error); }

        .stat-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 4px;
        }

        .stat-divider {
            width: 1px;
            height: 32px;
            background: var(--border);
        }

        /* === MAIN LAYOUT === */
        .main-layout {
            display: flex;
            height: calc(100vh - 97px);
            overflow: hidden;
        }

        /* === LEFT PANEL (INBOX) === */
        .inbox-panel {
            width: 35%;
            min-width: 340px;
            max-width: 480px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .inbox-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .inbox-header-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
        }

        .inbox-header-count {
            font-size: 12px;
            color: var(--gold);
            font-weight: 600;
        }

        .inbox-list {
            flex: 1;
            overflow-y: auto;
        }

        .inbox-list::-webkit-scrollbar {
            width: 4px;
        }

        .inbox-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .email-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s, border-left 0.2s;
            border-left: 3px solid transparent;
            opacity: 0;
            animation: slideInLeft 0.4s forwards;
        }

        .email-item:hover {
            background: rgba(201, 168, 76, 0.04);
        }

        .email-item.active {
            background: rgba(201, 168, 76, 0.08);
            border-left-color: var(--gold);
        }

        .email-item.active .email-sender {
            color: var(--gold);
        }

        .email-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .email-sender {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            transition: color 0.2s;
        }

        .email-time {
            font-size: 11px;
            color: var(--muted);
        }

        .email-subject {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-preview {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .email-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .badge-auto {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(76, 175, 80, 0.25);
        }

        .badge-escalated {
            background: rgba(255, 167, 38, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 167, 38, 0.25);
        }

        .badge-urgent {
            background: rgba(239, 83, 80, 0.15);
            color: var(--error);
            border: 1px solid rgba(239, 83, 80, 0.25);
            animation: urgentPulse 2s infinite;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .badge-auto .badge-dot { background: var(--success); }
        .badge-escalated .badge-dot { background: var(--warning); }
        .badge-urgent .badge-dot { background: var(--error); }

        /* Urgent email row highlight */
        .email-item.urgent-row {
            background: rgba(239, 83, 80, 0.05);
            border-left-color: var(--error);
        }

        .email-item.urgent-row:hover {
            background: rgba(239, 83, 80, 0.1);
        }

        /* === RIGHT PANEL (DETAIL) === */
        .detail-panel {
            flex: 1;
            background: var(--bg);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .detail-panel::-webkit-scrollbar {
            width: 4px;
        }

        .detail-panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .detail-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 12px;
        }

        .detail-empty-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .detail-empty-text {
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .detail-content {
            opacity: 0;
            animation: fadeIn 0.35s forwards;
        }

        /* Detail header */
        .detail-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .detail-subject {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .detail-meta-item {
            font-size: 13px;
            color: var(--muted);
        }

        .detail-meta-item strong {
            color: var(--text);
            font-weight: 500;
        }

        .detail-classification {
            margin-left: auto;
        }

        /* Detail body sections */
        .detail-sections {
            padding: 28px 32px;
        }

        .detail-section {
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeSlideUp 0.4s forwards;
        }

        .detail-section:nth-child(1) { animation-delay: 0.1s; }
        .detail-section:nth-child(2) { animation-delay: 0.2s; }
        .detail-section:nth-child(3) { animation-delay: 0.3s; }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .section-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
        }

        /* Email body card */
        .email-body-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
        }

        /* AI Analysis card */
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .analysis-item {
            background: rgba(201, 168, 76, 0.04);
            border: 1px solid rgba(201, 168, 76, 0.1);
            border-radius: 8px;
            padding: 14px 18px;
        }

        .analysis-item-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .analysis-item-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .analysis-item-value.gold { color: var(--gold); }
        .analysis-item-value.green { color: var(--success); }
        .analysis-item-value.amber { color: var(--warning); }
        .analysis-item-value.red { color: var(--error); }

        .confidence-bar {
            margin-top: 8px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s ease;
        }

        .confidence-fill.high { background: var(--success); }
        .confidence-fill.medium { background: var(--warning); }

        /* AI Response card */
        .ai-response-card {
            border-left: 3px solid var(--gold);
        }

        .ai-response-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .ai-response-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #D4B65C);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #0A0A0A;
            font-weight: 700;
        }

        .ai-response-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .ai-response-status {
            margin-left: auto;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-sent {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success);
        }

        .status-pending {
            background: rgba(255, 167, 38, 0.15);
            color: var(--warning);
        }

        .status-triggered {
            background: rgba(239, 83, 80, 0.15);
            color: var(--error);
        }

        .ai-response-body {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
        }

        /* Urgent callout */
        .urgent-callout {
            background: rgba(239, 83, 80, 0.08);
            border: 1px solid rgba(239, 83, 80, 0.25);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .urgent-callout-icon {
            font-size: 22px;
            color: var(--error);
        }

        .urgent-callout-text {
            font-size: 13px;
            color: var(--error);
            font-weight: 600;
            line-height: 1.4;
        }

        .urgent-callout-sub {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
            margin-top: 2px;
        }

        /* === ANIMATIONS === */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-16px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes urgentPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* === RESPONSIVE === */
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .inbox-panel {
                width: 100%;
                max-width: none;
                height: 45%;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .top-bar-stats {
                display: none;
            }
        }
    </style>
</head>

// Render inbox list
const inboxList = document.getElementById('inboxList');
emails.forEach((email, index) => {
    const item = document.createElement('div');
    item.className = 'email-item' + (email.urgent ? ' urgent-row' : '');
    item.style.animationDelay = `${0.6 + index * 0.08}s`;
    item.dataset.id = email.id;

    item.innerHTML = `
        <div class="email-item-top">
            <div class="email-sender">${email.sender}</div>
            <div class="email-time">${email.time}</div>
        </div>
        <div class="email-subject">${email.subject}</div>
        <div class="email-preview">${email.preview}</div>
        <span class="email-badge badge-${email.badge}">
            <span class="badge-dot"></span>
            ${email.badgeText}
        </span>
    `;

    item.addEventListener('click', () => selectEmail(email.id));
    inboxList.appendChild(item);
});

function selectEmail(id) {
    const email = emails.find(e => e.id === id);
    if (!email) return;

    // Update active state in inbox
    document.querySelectorAll('.email-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.id) === id);
    });

    // Hide empty state, show detail
    document.getElementById('detailEmpty').style.display = 'none';
    const detailContent = document.getElementById('detailContent');
    detailContent.style.display = 'block';

    // Build detail HTML
    let urgentHTML = '';
    if (email.urgent) {
        urgentHTML = `
            <div class="urgent-callout">
                <div class="urgent-callout-icon">&#9888;</div>
                <div>
                    <div class="urgent-callout-text">Emergency Protocol Activated</div>
                    <div class="urgent-callout-sub">Dr. Mokoena notified &bull; Emergency phone call triggered to 082 555 0147 &bull; Priority queue #1</div>
                </div>
            </div>
        `;
    }

    detailContent.innerHTML = `
        <div class="detail-header">
            <div class="detail-subject">${email.subject}</div>
            <div class="detail-meta">
                <div class="detail-meta-item"><strong>From:</strong> ${email.sender}</div>
                <div class="detail-meta-item"><strong>Time:</strong> ${email.time}</div>
                <div class="detail-meta-item"><strong>Patient ID:</strong> SF-2026-${4000 + email.id * 120}</div>
                <div class="detail-classification">
                    <span class="email-badge badge-${email.badge}">
                        <span class="badge-dot"></span>
                        ${email.badgeText}
                    </span>
                </div>
            </div>
        </div>
        <div class="detail-sections">
            ${urgentHTML}
            <div class="detail-section">
                <div class="section-label">Original Email</div>
                <div class="section-card">
                    <div class="email-body-text">${email.body}</div>
                </div>
            </div>
            <div class="detail-section">
                <div class="section-label">AI Analysis</div>
                <div class="section-card">
                    <div class="analysis-grid">
                        <div class="analysis-item">
                            <div class="analysis-item-label">Category</div>
                            <div class="analysis-item-value gold">${email.category}</div>
                        </div>
                        <div class="analysis-item">
                            <div class="analysis-item-label">Confidence</div>
                            <div class="analysis-item-value ${email.confidence >= 95 ? 'green' : 'amber'}">${email.confidence}%</div>
                            <div class="confidence-bar">
                                <div class="confidence-fill ${email.confidenceLevel}" style="width: ${email.confidence}%;"></div>
                            </div>
                        </div>
                        <div class="analysis-item">
                            <div class="analysis-item-label">Action Taken</div>
                            <div class="analysis-item-value">${email.action}</div>
                        </div>
                        <div class="analysis-item">
                            <div class="analysis-item-label">Response Status</div>
                            <div class="analysis-item-value">
                                <span class="ai-response-status status-${email.aiStatus}">${email.aiStatusLabel}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="detail-section">
                <div class="section-label">AI-Drafted Response</div>
                <div class="section-card ai-response-card">
                    <div class="ai-response-header">
                        <div class="ai-response-icon">AI</div>
                        <div class="ai-response-label">LAISA AI Response</div>
                        <span class="ai-response-status status-${email.aiStatus}">${email.aiStatusLabel}</span>
                    </div>
                    <div class="ai-response-body">${email.aiResponse}</div>
                </div>
            </div>
        </div>
    `;

    // Re-trigger animation
    detailContent.style.animation = 'none';
    detailContent.offsetHeight; // force reflow
    detailContent.style.animation = 'fadeIn 0.35s forwards';
}

// Auto-select first email on load
setTimeout(() => selectEmail(6), 1500);
